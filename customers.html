<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Customers | Product Manager</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>

    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="dashboard.css?v=4" />
    <link rel="stylesheet" href="toast.css" />
    <link rel="stylesheet" href="command-palette.css" />

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js?v=2"></script>

    <!-- Shared -->
    <script src="utils.js"></script>
    <script src="toast.js"></script>
    <script src="customers.js" defer></script>
    <script src="sidebar-user.js" defer></script>
    <script src="command-palette.js" defer></script>
</head>

<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i data-lucide="box" class="logo-icon"></i>
                <span class="logo-text">Manager</span>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <span class="nav-label">Menu</span>
                    <button class="nav-item" onclick="window.location.href='dashboard.html'">
                        <i data-lucide="layout-grid"></i> Dashboard
                    </button>
                    <button class="nav-item" onclick="window.location.href='add-product.html'">
                        <i data-lucide="plus-circle"></i> Add Product
                    </button>
                    <button class="nav-item" onclick="window.location.href='quote.html'">
                        <i data-lucide="file-plus"></i> Create Quote
                    </button>
                    <button class="nav-item" onclick="window.location.href='view_quotes.html'">
                        <i data-lucide="files"></i> View Quotes
                    </button>
                    <button class="nav-item active">
                        <i data-lucide="users"></i> Customers
                    </button>
                </div>

                <div class="nav-section">
                    <span class="nav-label">Analytics</span>
                    <button class="nav-item" onclick="window.location.href='product-analytics.html'">
                        <i data-lucide="bar-chart-2"></i> Products
                    </button>
                    <button class="nav-item" onclick="window.location.href='quote-analytics.html'">
                        <i data-lucide="pie-chart"></i> Quotes
                    </button>
                </div>
            </nav>

            <div class="sidebar-footer">
                <!-- sidebar-user.js injects user badge -->
                <button id="logoutBtn" class="nav-item danger">
                    <i data-lucide="log-out"></i> Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <h2 class="page-title">Customers</h2>
                <div class="search-bar">
                    <i data-lucide="search"></i>
                    <input type="text" id="customerSearch" placeholder="Search customers..." />
                </div>
                <button class="btn btn-outline btn-sm" onclick="CommandPalette.open()" title="Ctrl+K" style="display:flex;align-items:center;gap:6px;margin-left:auto;">
                    <i data-lucide="terminal" style="width:15px;height:15px;"></i>
                    <span style="font-size:0.78rem;">⌘K</span>
                </button>
            </header>

            <div class="content-wrapper">
                <!-- RFM Segment Legend (injected by customers.js) -->
                <div id="rfmLegend"></div>

                <div class="card table-card">
                    <div class="card-header">
                        <h3>Client List</h3>
                        <button id="addCustomerBtn" class="btn btn-primary btn-sm">
                            <i data-lucide="user-plus"></i> Add Customer
                        </button>
                    </div>

                    <div class="table-responsive">
                        <table id="customerTable">
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Email</th>
                                    <th>Phone</th>
                                    <th>Address</th>
                                    <th>RFM Segment</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                <!-- JS Populated -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Customer Modal -->
    <div id="customerModal" class="modal" style="display:none;">
        <div class="modal-content" style="max-width:500px;">
            <span class="close" id="closeCustomerModal">&times;</span>
            <h3 id="modalTitle">Add Customer</h3>
            <form id="customerForm" style="display:grid;gap:1rem;margin-top:1rem;">
                <input type="hidden" id="customerId">
                <div><label>Name *</label><input type="text" id="custName" required placeholder="Full Name"></div>
                <div><label>Email *</label><input type="email" id="custEmail" required placeholder="email@example.com"></div>
                <div><label>Phone</label><input type="tel" id="custPhone" placeholder="+91 98765 43210"></div>
                <div><label>Address</label><textarea id="custAddress" rows="3" placeholder="Street, City, State"></textarea></div>
                <button type="submit" class="btn btn-primary">Save Customer</button>
            </form>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>

</html>
