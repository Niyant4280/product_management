<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Product | Product Manager</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="dashboard.css" />
  <link rel="stylesheet" href="toast.css" />
  <link rel="stylesheet" href="command-palette.css" />

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="firebase-config.js?v=2"></script>
  <script src="utils.js"></script>
  <script src="toast.js"></script>

  <style>
    .form-card {
      background: white;
      border-radius: var(--radius-lg);
      padding: 2rem;
      max-width: 600px;
      margin: 0 auto;
      box-shadow: var(--shadow-md);
      border: 1px solid var(--border-color);
    }

    .form-grid {
      display: grid;
      gap: 1.5rem;
    }

    .form-actions {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }
  </style>
</head>

<body>

  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <i data-lucide="box" class="logo-icon"></i>
        <span class="logo-text">Manager</span>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">
          <span class="nav-label">Menu</span>
          <button class="nav-item" onclick="window.location.href='dashboard.html'">
            <i data-lucide="layout-grid"></i> Dashboard
          </button>
          <button class="nav-item active">
            <i data-lucide="plus-circle"></i> Add Product
          </button>
          <button class="nav-item" onclick="window.location.href='quote.html'">
            <i data-lucide="file-plus"></i> Create Quote
          </button>
          <button class="nav-item" onclick="window.location.href='view_quotes.html'">
            <i data-lucide="files"></i> View Quotes
          </button>
          <button class="nav-item" onclick="window.location.href='customers.html'">
            <i data-lucide="users"></i> Customers
          </button>
        </div>

        <div class="nav-section">
          <span class="nav-label">Analytics</span>
          <button class="nav-item" onclick="window.location.href='product-analytics.html'">
            <i data-lucide="bar-chart-2"></i> Products
          </button>
          <button class="nav-item" onclick="window.location.href='quote-analytics.html'">
            <i data-lucide="pie-chart"></i> Quotes
          </button>
        </div>
      </nav>

      <div class="sidebar-footer">
        <!-- sidebar-user.js injects user badge -->
        <button id="logoutBtn" class="nav-item danger">
          <i data-lucide="log-out"></i> Logout
        </button>
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="top-bar">
        <h2 class="page-title">Add New Product</h2>
      </header>

      <div class="content-wrapper">
        <div class="form-card">
          <form id="addProductForm" class="form-grid">
            <div>
              <label for="name">Product Name</label>
              <div style="display:flex;gap:0.5rem;align-items:flex-start;">
                <div style="flex:1;">
                  <input id="name" type="text" placeholder="e.g., Wireless Headphones" required />
                  <!-- Duplicate Warning injected here by JS -->
                  <div id="duplicateWarning"></div>
                </div>
                <button type="button" id="scanBarcodeBtn" class="btn btn-outline btn-sm" title="Scan barcode with camera" style="margin-top:2px;white-space:nowrap;display:flex;align-items:center;gap:5px;">
                  <i data-lucide="scan-line" style="width:15px;height:15px;"></i> Scan
                </button>
              </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
              <div>
                <label for="price">Price (₹)</label>
                <input id="price" type="number" min="0" step="0.01" placeholder="1999" required />
              </div>
              <div>
                <label for="stock">Stock</label>
                <input id="stock" type="number" min="0" placeholder="10" required />
              </div>
            </div>

            <div>
              <label for="category">Category</label>
              <input id="category" type="text" placeholder="Electronics" required />
            </div>

            <div>
              <label for="status">Status</label>
              <select id="status" required>
                <option value="Available">Available</option>
                <option value="Out of Stock">Out of Stock</option>
                <option value="Discontinued">Discontinued</option>
              </select>
            </div>

            <div class="form-actions">
              <button type="submit" class="btn btn-primary" style="flex: 1;">
                <i data-lucide="save"></i> Save Product
              </button>
              <button type="button" id="cancelBtn" class="btn btn-outline">Cancel</button>
            </div>

            <div id="formMsg" style="text-align: center; font-size: 0.9rem; margin-top: 0.5rem;"></div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <!-- Barcode Scanner Modal -->
  <div id="barcodeModal" class="modal" style="display:none;">
    <div class="modal-content" style="max-width:480px;text-align:center;">
      <span class="close" id="closeBarcodeModal">&times;</span>
      <h3 style="margin-bottom:0.5rem;">📷 Barcode Scanner</h3>
      <p style="color:#64748b;font-size:0.88rem;margin-bottom:1rem;">Point your camera at a product barcode</p>
      <div style="position:relative;border-radius:12px;overflow:hidden;background:#0f172a;aspect-ratio:4/3;">
        <video id="barcodeVideo" style="width:100%;height:100%;object-fit:cover;" autoplay playsinline muted></video>
        <!-- Scanning crosshair overlay -->
        <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:none;">
          <div style="width:220px;height:100px;border:2px solid #6366f1;border-radius:8px;box-shadow:0 0 0 9999px rgba(0,0,0,0.5);animation:pulse-border 1.5s ease infinite;"></div>
        </div>
        <div style="position:absolute;top:10px;left:10px;background:rgba(99,102,241,0.9);color:white;font-size:0.75rem;font-weight:600;padding:4px 10px;border-radius:20px;">LIVE</div>
      </div>
      <p style="margin-top:0.75rem;font-size:0.85rem;color:#94a3b8;" id="scanStatus">Initializing...</p>
      <button class="btn btn-outline" id="cancelScanBtn" style="margin-top:0.5rem;">Cancel</button>
    </div>
  </div>

  <style>
    @keyframes pulse-border {
      0%,100% { box-shadow: 0 0 0 9999px rgba(0,0,0,0.5), 0 0 0 2px rgba(99,102,241,0.5); }
      50%      { box-shadow: 0 0 0 9999px rgba(0,0,0,0.5), 0 0 15px 4px rgba(99,102,241,0.8); }
    }
  </style>

  <script src="add-product.js" defer></script>
  <script src="sidebar-user.js" defer></script>
  <script src="command-palette.js" defer></script>
</body>

</html>
